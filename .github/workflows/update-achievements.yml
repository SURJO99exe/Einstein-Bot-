name: Update GitHub Profile Trophies

on:
  schedule:
    - cron: '0 0 * * *' # Runs every day at midnight
  workflow_dispatch: # Allows manual trigger

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Update Trophies
        run: |
          # This is a placeholder for a script that could fetch and update the README
          # However, the trophy widget used in the README is already dynamic 
          # (it fetches data every time the profile is viewed).
          # We can add a "Last Updated" timestamp to ensure the README is refreshed.
          sed -i "s/Last updated: .*/Last updated: $(date)/" README.md || echo "Last updated: $(date)" >> README.md
          
      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "docs: automated achievement refresh [skip ci]" || echo "No changes to commit"
          git push
