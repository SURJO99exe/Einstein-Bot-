<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Einstein Bot - Chat Interface</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .chat-container {
            width: 100%;
            max-width: 900px;
            height: 100vh;
            max-height: 900px;
            background: #fff;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .chat-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px 25px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .bot-avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        .header-info h2 {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .header-info p {
            font-size: 13px;
            opacity: 0.9;
        }

        .status-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            background: #4ade80;
            border-radius: 50%;
            margin-right: 6px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 25px;
            background: linear-gradient(180deg, #f8fafc 0%, #f1f5f9 100%);
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .message {
            max-width: 70%;
            padding: 14px 18px;
            border-radius: 18px;
            font-size: 15px;
            line-height: 1.5;
            word-wrap: break-word;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.received {
            background: white;
            align-self: flex-start;
            border-bottom-left-radius: 4px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
            color: #1e293b;
        }

        .message.sent {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }

        .message-time {
            font-size: 11px;
            opacity: 0.7;
            margin-top: 6px;
        }

        .message.sent .message-time {
            color: rgba(255, 255, 255, 0.8);
        }

        .input-container {
            background: white;
            padding: 12px 20px;
            border-top: 1px solid #e2e8f0;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .icon-btn {
            width: 44px;
            height: 44px;
            border: none;
            background: transparent;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
            color: #64748b;
        }

        .icon-btn:hover {
            background: #f1f5f9;
            color: #334155;
            transform: scale(1.05);
        }

        .icon-btn svg {
            width: 24px;
            height: 24px;
        }

        .input-wrapper {
            flex: 1;
            position: relative;
        }

        .message-input {
            width: 100%;
            padding: 14px 18px;
            border: 2px solid #e2e8f0;
            border-radius: 25px;
            font-size: 15px;
            outline: none;
            transition: all 0.2s ease;
            background: #f8fafc;
        }

        .message-input:focus {
            border-color: #667eea;
            background: white;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .message-input::placeholder {
            color: #94a3b8;
        }

        .send-btn {
            width: 48px;
            height: 48px;
            border: none;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
            color: white;
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }

        .send-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.5);
        }

        .send-btn:active {
            transform: scale(0.95);
        }

        .send-btn svg {
            width: 22px;
            height: 22px;
        }

        /* Typing indicator */
        .typing-indicator {
            display: none;
            align-items: center;
            gap: 8px;
            padding: 14px 18px;
            background: white;
            border-radius: 18px;
            border-bottom-left-radius: 4px;
            align-self: flex-start;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
        }

        .typing-indicator.active {
            display: flex;
        }

        .typing-dots {
            display: flex;
            gap: 4px;
        }

        .typing-dots span {
            width: 8px;
            height: 8px;
            background: #94a3b8;
            border-radius: 50%;
            animation: typing 1.4s infinite ease-in-out both;
        }

        .typing-dots span:nth-child(1) { animation-delay: -0.32s; }
        .typing-dots span:nth-child(2) { animation-delay: -0.16s; }

        @keyframes typing {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }

        /* Scrollbar styling */
        .chat-messages::-webkit-scrollbar {
            width: 8px;
        }

        .chat-messages::-webkit-scrollbar-track {
            background: transparent;
        }

        .chat-messages::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 4px;
        }

        .chat-messages::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }

        /* Mobile responsive */
        @media (max-width: 600px) {
            .chat-container {
                border-radius: 0;
                height: 100vh;
                max-height: 100vh;
            }
        }

        /* Command suggestions */
        .command-pills {
            display: flex;
            gap: 8px;
            padding: 10px 20px;
            overflow-x: auto;
            background: white;
            border-top: 1px solid #e2e8f0;
        }

        .command-pill {
            padding: 8px 16px;
            background: #f1f5f9;
            border: 1px solid #e2e8f0;
            border-radius: 20px;
            font-size: 13px;
            color: #475569;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.2s ease;
        }

        .command-pill:hover {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }

        .welcome-message {
            text-align: center;
            padding: 40px 20px;
            color: #64748b;
        }

        .welcome-message h3 {
            font-size: 24px;
            color: #1e293b;
            margin-bottom: 12px;
        }

        .welcome-message p {
            font-size: 15px;
            line-height: 1.6;
            max-width: 400px;
            margin: 0 auto;
        }

        .feature-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-top: 25px;
            max-width: 500px;
            margin-left: auto;
            margin-right: auto;
        }

        .feature-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            padding: 15px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
        }

        .feature-item span:first-child {
            font-size: 24px;
        }

        .feature-item span:last-child {
            font-size: 12px;
            color: #64748b;
        }

        @media (max-width: 500px) {
            .feature-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">
            <div class="bot-avatar">👨‍🔬</div>
            <div class="header-info">
                <h2>Einstein Bot</h2>
                <p><span class="status-dot"></span>Online</p>
            </div>
        </div>

        <div class="chat-messages" id="chatMessages">
            <div class="welcome-message">
                <h3>Welcome to Einstein Bot! 🚀</h3>
                <p>Your intelligent assistant for downloads, media processing, scientific calculations, games, and more!</p>
                
                <div class="feature-grid">
                    <div class="feature-item">
                        <span>🎬</span>
                        <span>Video Download</span>
                    </div>
                    <div class="feature-item">
                        <span>🔬</span>
                        <span>Science Lab</span>
                    </div>
                    <div class="feature-item">
                        <span>🎮</span>
                        <span>Games</span>
                    </div>
                    <div class="feature-item">
                        <span>🛠️</span>
                        <span>Tools</span>
                    </div>
                    <div class="feature-item">
                        <span>🤖</span>
                        <span>AI Features</span>
                    </div>
                    <div class="feature-item">
                        <span>📊</span>
                        <span>Analytics</span>
                    </div>
                </div>
            </div>

            <div class="typing-indicator" id="typingIndicator">
                <span>Einstein is thinking</span>
                <div class="typing-dots">
                    <span></span>
                    <span></span>
                    <span></span>
                </div>
            </div>
        </div>

        <div class="command-pills">
            <div class="command-pill" onclick="insertCommand('/video')">/video</div>
            <div class="command-pill" onclick="insertCommand('/enhance')">/enhance</div>
            <div class="command-pill" onclick="insertCommand('/calc')">/calc</div>
            <div class="command-pill" onclick="insertCommand('/stock')">/stock</div>
            <div class="command-pill" onclick="insertCommand('/habit')">/habit</div>
            <div class="command-pill" onclick="insertCommand('/help')">/help</div>
        </div>

        <div class="input-container">
            <button class="icon-btn" title="Attach file" onclick="attachFile()">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.172 7l-6.586 6.586a2 2 0 102.828 2.828l6.414-6.586a4 4 0 00-5.656-5.656l-6.415 6.585a6 6 0 108.486 8.486L20.5 13" />
                </svg>
            </button>

            <div class="input-wrapper">
                <input type="text" class="message-input" id="messageInput" placeholder="Write a message..." onkeypress="handleKeyPress(event)">
            </div>

            <button class="icon-btn" title="Apps" onclick="showApps()">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z" />
                </svg>
            </button>

            <button class="icon-btn" title="Emoji" onclick="showEmoji()">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14.828 14.828a4 4 0 01-5.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                </svg>
            </button>

            <button class="icon-btn" title="Voice message" onclick="recordVoice()">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z" />
                </svg>
            </button>

            <button class="send-btn" title="Send" onclick="sendMessage()">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8" />
                </svg>
            </button>
        </div>
    </div>

    <script>
        const chatMessages = document.getElementById('chatMessages');
        const messageInput = document.getElementById('messageInput');
        const typingIndicator = document.getElementById('typingIndicator');

        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                sendMessage();
            }
        }

        function insertCommand(command) {
            messageInput.value = command + ' ';
            messageInput.focus();
        }

        function sendMessage() {
            const message = messageInput.value.trim();
            if (!message) return;

            // Add user message
            addMessage(message, 'sent');
            messageInput.value = '';

            // Show typing indicator
            typingIndicator.classList.add('active');
            scrollToBottom();

            // Simulate bot response
            setTimeout(() => {
                typingIndicator.classList.remove('active');
                const response = getBotResponse(message);
                addMessage(response, 'received');
                scrollToBottom();
            }, 1500 + Math.random() * 1000);
        }

        function addMessage(text, type) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${type}`;
            
            const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            
            messageDiv.innerHTML = `
                ${text}
                <div class="message-time">${time}</div>
            `;
            
            // Insert before typing indicator
            chatMessages.insertBefore(messageDiv, typingIndicator);
        }

        function scrollToBottom() {
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        function getBotResponse(message) {
            const lowerMsg = message.toLowerCase();
            
            if (lowerMsg.startsWith('/video')) {
                return '🎬 <b>Video Download</b><br>Please provide a video URL. Example: <code>/video https://youtube.com/watch?v=...</code>';
            }
            if (lowerMsg.startsWith('/calc')) {
                return '🧮 <b>Scientific Calculator</b><br>Send an expression like: <code>/calc sin(pi/2) + sqrt(16)</code>';
            }
            if (lowerMsg.startsWith('/stock')) {
                return '📈 <b>Stock Market Simulator</b><br>Welcome to Einstein Stock Exchange! Use <code>/stock buy QTM 10</code> to purchase shares.';
            }
            if (lowerMsg.startsWith('/habit')) {
                return '📊 <b>Habit Tracker</b><br>Track your daily habits! Use <code>/habit add Exercise</code> to start tracking.';
            }
            if (lowerMsg.startsWith('/help')) {
                return `📖 <b>Einstein Bot Commands</b><br>
                • /video - Download videos<br>
                • /enhance - Enhance video quality<br>
                • /calc - Scientific calculator<br>
                • /stock - Stock market game<br>
                • /habit - Habit tracker<br>
                • /meditate - Meditation timer<br>
                • /pomodoro - Productivity timer<br>
                • /bookmark - Save bookmarks<br>
                • /analyze_text - Text analysis<br>
                • /cipher - Encrypt/decrypt text<br>
                • /time - Timezone converter<br>
                • /hangman - Word game<br>
                • /password - Generate passwords`;
            }
            if (lowerMsg.startsWith('/meditate')) {
                return '🧘 <b>Meditation Timer</b><br>Set the duration in minutes: <code>/meditate 10</code>';
            }
            if (lowerMsg.startsWith('/pomodoro')) {
                return '🍅 <b>Pomodoro Timer</b><br>Use <code>/pomodoro start</code> to begin a 25-minute focus session!';
            }
            if (lowerMsg.startsWith('/bookmark')) {
                return '🔖 <b>Bookmark Manager</b><br>Save links with: <code>/bookmark add https://example.com My Bookmark</code>';
            }
            if (lowerMsg.startsWith('/enhance')) {
                return '✨ <b>Video Enhancer</b><br>Reply to a video with <code>/enhance</code> to upscale and improve quality!';
            }
            
            return `👨‍🔬 <b>Einstein says:</b><br>"${message}" is an interesting input! Try using one of the commands above or type <code>/help</code> to see all available features.`;
        }

        function attachFile() {
            addMessage('📎 Attachment feature would open file picker here...', 'received');
        }

        function showApps() {
            addMessage('📱 <b>Apps Menu</b><br>• Calculator<br>• Unit Converter<br>• Currency Converter<br>• Weather<br>• News', 'received');
        }

        function showEmoji() {
            addMessage('😀 Emoji picker would appear here...', 'received');
        }

        function recordVoice() {
            addMessage('🎤 Voice recording would start here...', 'received');
        }

        // Auto-focus input on load
        messageInput.focus();
    </script>
</body>
</html>
